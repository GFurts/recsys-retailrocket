name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pip install poetry==2.4.1

      - name: Install dependencies
        run: poetry install --only main,dev

      - name: Run linting
        run: poetry run ruff check src/ tests/

      - name: Run tests
        run: poetry run pytest tests/ -v --cov=src/recsys