stages:
  preprocess:
    cmd: poetry run python src/recsys/data/preprocessor.py
    deps:
      - src/recsys/data/preprocessor.py
      - data/raw/events.csv
    outs:
      - data/processed/events_processed.csv

  feature_eng:
    cmd: poetry run python src/recsys/features/feature_engineer.py
    deps:
      - src/recsys/features/feature_engineer.py
      - data/processed/events_processed.csv
    outs:
      - data/processed/user_features.csv
      - data/processed/interaction_matrix.npz

  train:
    cmd: poetry run python src/recsys/models/train.py
    deps:
      - src/recsys/models/train.py
      - data/processed/interaction_matrix.npz
      - data/processed/user_features.csv
    outs:
      - models/recommender.pt
    metrics:
      - metrics/train_metrics.json:
          cache: false

  evaluate:
    cmd: poetry run python src/recsys/evaluation/evaluator.py
    deps:
      - src/recsys/evaluation/evaluator.py
      - models/recommender.pt
      - data/processed/events_processed.csv
    metrics:
      - metrics/eval_metrics.json:
          cache: false