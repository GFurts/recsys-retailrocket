services:
  mlflow:
    image: python:3.10-slim
    command: >
      bash -c "pip install mlflow==2.10.0 &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  training:
    build:
      context: .
      target: runtime
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=recsys-retailrocket
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./metrics:/app/metrics

volumes:
  mlflow_data: